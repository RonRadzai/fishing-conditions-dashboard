<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c2324"/>
      <stop offset="100%" stop-color="#081828"/>
    </linearGradient>
    <linearGradient id="fish" x1="4" y1="32" x2="52" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1752a0"/>
      <stop offset="55%" stop-color="#1a8068"/>
      <stop offset="100%" stop-color="#1db87a"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="100%" stop-color="#f2c66d"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Subtle ring -->
  <circle cx="32" cy="32" r="30.5" fill="none" stroke="#1e7966" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Fishing line from mouth to hook -->
  <line x1="51" y1="31" x2="57" y2="9" stroke="#F6E7B0" stroke-width="0.7" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- Hook J-shape -->
  <path d="M57,9 L57,17 C57,22 62.5,22 62.5,17.5" fill="none" stroke="#F6E7B0" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
  <!-- Hook barb -->
  <line x1="62.5" y1="17.5" x2="60" y2="16" stroke="#F6E7B0" stroke-width="1" stroke-linecap="round" stroke-opacity="0.65"/>

  <!-- Fish with glow -->
  <g filter="url(#glow)">
    <!-- Forked tail -->
    <path d="M12,32 L3,20 L10,32 L3,44 Z" fill="url(#fish)"/>
    <!-- Body -->
    <path d="M51,31 C49,22 38,18 26,20 C16,22 10,27 10,32 C10,37 16,42 26,44 C38,46 49,42 51,31 Z" fill="url(#fish)"/>
    <!-- Dorsal fin -->
    <path d="M27,20 C29,12 37,11 39.5,17.5 L36,20 Z" fill="url(#fish)" opacity="0.88"/>
    <!-- Pectoral fin -->
    <path d="M30,37 C34,40 35,44 31,44 Z" fill="url(#fish)" opacity="0.7"/>
  </g>

  <!-- Scale sheen (subtle highlight on body) -->
  <path d="M22,23 C30,20 40,21 48,26" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.12" stroke-linecap="round"/>
  <path d="M20,27 C28,25 40,25 49,29" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.08" stroke-linecap="round"/>

  <!-- Eye -->
  <circle cx="43.5" cy="27.5" r="3.2" fill="url(#eyeGlow)"/>
  <circle cx="42.5" cy="27" r="1.5" fill="#102b2c" opacity="0.9"/>
  <circle cx="41.8" cy="26.4" r="0.6" fill="white" opacity="0.7"/>
</svg>
