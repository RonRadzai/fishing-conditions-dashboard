<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.solunar.org https://api.weather.gov https://api.waterdata.usgs.gov https://fonts.googleapis.com https://fonts.gstatic.com;"
    />
    <title>Whitethorne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-left"></div>
    <div class="bg-orb bg-orb-right"></div>
    <main class="layout">
      <header class="hero">
        <h1>Whitethorne</h1>
        <p id="location-summary" class="subtitle">Loading location...</p>
      </header>

      <section class="card quick-view" aria-label="Quick view">
        <div id="qv-content" class="qv-content"></div>
      </section>

      <section class="card solunar-section" id="solunar-card">
        <div class="card-title-row">
          <div>
            <h2>Solunar</h2>
          </div>
          <p id="solunar-meta" class="card-meta">7 days | ET</p>
        </div>
        <div id="solunar-content" class="content-block"></div>
      </section>

      <section class="grid">
        <article class="card" id="weather-card">
          <div class="card-title-row">
            <h2>Weather</h2>
            <p id="weather-meta" class="card-meta">Now + 8h</p>
          </div>
          <p id="weather-updated" class="card-meta"></p>
          <div id="weather-content" class="content-block"></div>
        </article>

        <article class="card" id="aep-card">
          <div class="card-title-row">
            <h2>Flow</h2>
          </div>
          <p id="aep-updated" class="card-meta"></p>
          <div id="aep-content" class="content-block"></div>
        </article>

        <article class="card" id="usgs-card">
          <div class="card-title-row">
            <h2>Radford Gauge</h2>
          </div>
          <div id="usgs-content" class="content-block"></div>
        </article>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
